name: Notion Daily Backup

on:
  schedule:
    # Tourne chaque jour à 2h du matin (heure UTC)
    - cron: '0 2 * * *'
  workflow_dispatch: # Permet de lancer manuellement

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install notion-client google-auth-oauthlib google-auth-httplib2 google-api-python-client
      
      - name: Run Notion Backup
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: python backup_notion.py
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Backup Notion: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push || echo "No changes to push"
